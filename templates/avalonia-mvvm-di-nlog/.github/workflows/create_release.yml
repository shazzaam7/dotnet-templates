name: Create release
permissions:
  contents: write
  actions: read

on:
  workflow_call:
    inputs:
      is_stable:
        required: true
        type: boolean

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: "MyCustomTemplate"
          path: ./publish/desktop

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path .\publish\desktop\* -DestinationPath .\MyCustomTemplate.zip

      - name: Get latest stable release info
        id: stable_release
        shell: pwsh
        continue-on-error: true
        run: |
          $url = "https://api.github.com/repos/${{ github.repository }}/releases/latest"
          $headers = @{
            "Accept" = "application/vnd.github+json"
            "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          try {
            $response = Invoke-RestMethod -Uri $url -Headers $headers -ErrorAction Stop
            "LATEST_RELEASE_TAG=$($response.tag_name)" >> $env:GITHUB_ENV
            "LATEST_RELEASE_FOUND=true" >> $env:GITHUB_ENV
          } catch {
            "LATEST_RELEASE_FOUND=false" >> $env:GITHUB_ENV
          }

      - name: Generate changelog
        id: changelog
        shell: pwsh
        continue-on-error: true
        run: |
          $lastCommitSha = ""
          if ("${{ env.LATEST_RELEASE_FOUND }}" -eq "true") {
            $lastCommitSha = git rev-list -n 1 "${{ env.LATEST_RELEASE_TAG }}" 2>$null
          }
          python ./scripts/generate_changelog.py $lastCommitSha --debug 2>> changelog_debug.txt || true
          if (Test-Path "CHANGELOG.md") {
            $changelogContent = Get-Content "CHANGELOG.md" -Raw
            Write-Host "Changelog generated successfully"
            "CHANGELOG=$changelogContent" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "No changelog generated, will use default"
          }

      - name: Get release metadata
        id: info
        shell: pwsh
        run: |
          $sha = "${{ github.sha }}"
          $shortSha = $sha.Substring(0, 7)
          $branch = "${{ github.ref_name }}"

          "sha_short=$shortSha" >> $env:GITHUB_OUTPUT
          "branch=$branch" >> $env:GITHUB_OUTPUT

      - name: Create nightly release
        if: "!inputs.is_stable"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $shaShort = "${{ steps.info.outputs.sha_short }}"
          $branch = "${{ steps.info.outputs.branch }}"
          $compareUrl = "${{ github.server_url }}/${{ github.repository }}/compare/${{ env.LATEST_RELEASE_TAG }}...$shaShort"

          $notes = @"
          This is an automated nightly build containing the latest changes from the $branch branch.

          ⚠️  Warning: This is a development build and may contain bugs or incomplete features.
          📋 See all changes since the latest release: $compareUrl

          📝 Commit: $shaShort
          🌿 Branch: $branch
          "@

          $tag = "nightly"
          Write-Host "Checking if nightly release exists..."
          gh release view $tag --json id 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Nightly release found. Deleting and recreating..."
            gh release delete $tag --yes --cleanup-tag
          }

          Write-Host "Creating new nightly release..."
          gh release create $tag MyCustomTemplate.zip --prerelease --title "MyCustomTemplate (Nightly)" --notes "$notes" --target $branch

      - name: Create stable release
        if: "inputs.is_stable"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $shaShort = "${{ steps.info.outputs.sha_short }}"

          Write-Host "Creating stable draft release..."
          gh release create $shaShort MyCustomTemplate.zip --draft --generate-notes --title "MyCustomTemplate ($shaShort)"
          Write-Host "Stable draft release created! Go to GitHub to publish it."